<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitalizarea Romsilva | Propunere Tehnică ISR</title>
    <style>
        :root {
            --bg: #e9e9e7;
            --paper: #e9e9e7;
            --ink: #111111;
            --muted: #4f4f4f;
            --line: #b7b7b2;
            --accent: #ef3b5d;
            --forest: #173f31;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: Arial, Helvetica, sans-serif;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar { display: none; }

        .deck { 
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        
        .slide { 
            background: var(--paper); 
            height: 100vh;
            width: 100vw;
            display: grid; 
            grid-template-rows: auto 1fr auto; 
            border-bottom: 1px solid #d6d6d1; 
            padding: 28px 34px 18px;
            position: relative;
            overflow: hidden; 
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        .header { display: flex; justify-content: space-between; align-items: center; z-index: 5; }
        .logo-strip { display: flex; gap: 15px; align-items: center; }
        .logo-tag { border: 1px solid var(--line); padding: 5px 12px; font-size: 11px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .logo-tag span { width: 10px; height: 10px; background: var(--accent); border-radius: 2px; }
        .rule { height: 1px; background: var(--line); flex: 1; margin: 0 20px; }
        .page-num { font-size: 12px; font-weight: 700; }

        .main-grid { display: grid; grid-template-columns: 35% 65%; gap: 30px; height: 100%; min-height: 0; align-items: stretch; margin-top: 10px; }
        .content { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-bottom: 20px; }
        
        .media-box { border: 1px solid #cbcbc6; background: #000; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; position: relative; overflow: hidden; }
        .media-box img, .media-box video { width: 100%; height: 100%; object-fit: contain; }
        
        h1 { font-size: 42px; line-height: 0.95; font-weight: 900; letter-spacing: -0.05em; }
        h2 { font-size: 26px; font-weight: 900; text-transform: uppercase; }
        .hl { background: var(--accent); color: #fff; padding: 2px 10px; display: inline-block; }
        .lead { font-size: 16px; font-weight: 700; color: #222; line-height: 1.3; }
        .card { background: #f1f1ef; border: 1px solid #cbcbc6; padding: 12px; border-left: 5px solid var(--accent); font-size: 13px; line-height: 1.4; }
        
        .table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 5px; }
        .table th, .table td { padding: 8px; border: 1px solid var(--line); text-align: left; }
        .table th { background: #ececea; text-transform: uppercase; font-size: 9px; letter-spacing: 0.5px; }
        
        .footer { display: flex; justify-content: space-between; padding-top: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; border-top: 1px solid var(--line); color: var(--muted); }

        .final { 
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.5)), url('image_50.png'); 
            background-size: cover; background-position: center; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border: none; 
        }

        /* Stiluri pentru logo-uri pe ultimul slide */
        .final-logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            margin: 40px 0;
        }
        .final-logo-skyline {
            height: 70px !important;
            width: auto !important;
        }
        .final-logo-vodafone {
            height: 160px !important;
            width: auto !important;
        }
        .final-divider {
            width: 1px;
            height: 80px;
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<div class="deck">
    <section class="slide final">
        <h1 style="font-size:55px; color:#fff; font-weight: 900; margin-bottom: 10px;">PARTENERIAT PENTRU DIGITALIZARE</h1>
        
        <div class="final-logo-container">
            <img src="Alb - High.png" class="final-logo-skyline" alt="Skyline Drones">
            
            <div class="final-divider"></div>
            
            <img src="https://www.logo.wine/a/logo/Vodafone/Vodafone-Logo.wine.svg" class="final-logo-vodafone" alt="Vodafone Business">
        </div>

        <p style="font-size:22px; max-width:850px; font-weight: 300; letter-spacing: 2px; color: rgba(255,255,255,0.8);">VODAFONE BUSINESS | SKYLINE DRONES | ROMSILVA</p>
    </section>
</div>

</body>
</html>
